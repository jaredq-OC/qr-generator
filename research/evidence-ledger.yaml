## Design Decisions

```yaml
DEC-01:
  decision: "Use CIFilter.qrCodeGenerator() from CoreImage for QR generation"
  rationale: "Native Apple API, no external dependency, works fully offline, fast"
  alternatives_considered: ["EFQRCode (third-party)", "QRCodeView library"]
  evidence: [EV-01, EV-02]

DEC-02:
  decision: "WiFi QR payload uses MECARD-like format WIFI:T:<enc>;S:<ssid>;P:<password>;; with backslash escaping"
  rationale: "ISO/IEC 18004:2006 standard format, universally supported by iOS Camera, Android, and dedicated scanners"
  evidence: [EV-03, EV-04]

DEC-03:
  decision: "Single-screen layout with segmented picker for QR type selection"
  rationale: "Single-purpose tool; minimal navigation; fast type switching without screen transitions"
  alternatives_considered: ["Tab-based (rejected — more friction)"]
  evidence: []

DEC-04:
  decision: "History stored as Codable struct in UserDefaults + PNG thumbnails in Documents/Thumbnails/"
  rationale: "UserDefaults handles small structured data natively; file system for binary; no external DB needed"
  evidence: [EV-05]

DEC-05:
  decision: "Always use /usr/local/bin/xcodegen for project generation"
  rationale: "/Users/jared/bin/xcodegen is a broken 9-byte stub per KB"
  evidence: [EV-06]

DEC-06:
  decision: "Target iOS 16+ as minimum deployment"
  rationale: "Modern SwiftUI APIs (shareLink), broad adoption (>96%), no reason to target older"
  evidence: []
```
